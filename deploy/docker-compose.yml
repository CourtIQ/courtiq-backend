version: '3'

services:
  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: ${API_GATEWAY_NAME}
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    env_file:
      - .env.populated
    depends_on:
      - user-service
      - string-service
      - matchup-service
      - relationship-service
    networks:
      - backend-network

  user-service:
    build:
      context: ../user-service
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: user-service
        SERVICE_PORT: 8081
    container_name: ${USER_SERVICE_NAME}
    ports:
      - "8081:8081"
    env_file:
      - .env.populated
    networks:
      - backend-network

  string-service:
    build:
      context: ../string-service
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: string-service
        SERVICE_PORT: 8082
    container_name: ${STRING_SERVICE_NAME}
    ports:
      - "8082:8082"
    env_file:
      - .env.populated
    networks:
      - backend-network

  matchup-service:
    build:
      context: ../matchup-service
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: matchup-service
        SERVICE_PORT: 8083
    container_name: ${MATCHUP_SERVICE_NAME}
    ports:
      - "8083:8083"
    env_file:
      - .env.populated
    networks:
      - backend-network

  relationship-service:
    build:
      context: ../relationship-service
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: relationship-service
        SERVICE_PORT: 8084
    container_name: ${RELATIONSHIP_SERVICE_NAME}
    ports:
      - "8084:8084"
    env_file:
      - .env.populated
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge
