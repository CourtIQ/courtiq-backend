version: '3'

services:
  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - USER_SERVICE_URL=http://user-service:8081/query
      - STRING_SERVICE_URL=http://string-service:8082/query
      - MATCHUP_SERVICE_URL=http://matchup-service:8083/query
      - RELATIONSHIP_SERVICE_URL=http://relationship-service:8084/query
    depends_on:
      - user-service
      - string-service
      - matchup-service
      - relationship-service

  user-service:
    build:
      context: ../user-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-service
        SERVICE_PORT: 8081
    ports:
      - "8081:8081"

  string-service:
    build:
      context: ../string-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: string-service
        SERVICE_PORT: 8082
    ports:
      - "8082:8082"

  matchup-service:
    build:
      context: ../matchup-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: matchup-service
        SERVICE_PORT: 8083
    ports:
      - "8083:8083"

  relationship-service:
    build:
      context: ../relationship-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: relationship-service
        SERVICE_PORT: 8084
    ports:
      - "8084:8084"